<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome to Choreboo</title>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed-variant": "#4f00d0",
              "inverse-on-surface": "#edf1f5",

              "on-primary-fixed": "#002204",
              "tertiary-fixed": "#e8deff",
              "surface-container-highest": "#dfe3e7",

              "surface-tint": "#006e1c",
              "on-primary": "#ffffff",
              "primary": "#006e1c",
              "on-secondary-fixed": "#2c1600",
              "error-container": "#ffdad6",
              "tertiary-container": "#a488ff",
              "primary-fixed": "#94f990",
              "tertiary-fixed-dim": "#cdbdff",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#3f4a3c",
              "tertiary": "#6833ea",
              "primary-container": "#4caf50",
              "inverse-surface": "#2c3134",
              "outline-variant": "#becab9",
              "on-secondary-container": "#653900",
              "surface-container-low": "#f0f4f8",
              "secondary-fixed-dim": "#ffb870",
              "on-error": "#ffffff",
              "secondary-container": "#ff9800",
              "background": "#f6fafe",
              "on-surface": "#171c1f",
              "secondary": "#8b5000",
              "on-primary-container": "#003c0b",
              "surface-container-high": "#e4e9ed",
              "surface": "#f6fafe",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",

              "error": "#ba1a1a",

              "inverse-primary": "#78dc77",
              "surface-bright": "#f6fafe",
              "on-secondary-fixed-variant": "#693c00",
              "secondary-fixed": "#ffdcbe",
              "on-tertiary-fixed": "#20005f",
              "surface-variant": "#dfe3e7",
              "surface-container": "#eaeef2",
              "outline": "#6f7a6b",
              "on-background": "#171c1f"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f6fafe;
        }
        .pet-option.selected {
            border-color: #006e1c;
            background-color: rgba(0, 110, 28, 0.08);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-on-surface antialiased">
<main class="min-h-screen flex flex-col items-center justify-between px-6 py-12 max-w-md mx-auto relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-tertiary-container/10 rounded-full blur-3xl"></div>
<!-- Header Section -->
<div class="w-full text-center z-10">
<div class="inline-flex items-center justify-center p-3 mb-6 bg-surface-container-highest rounded-2xl shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="sparkles">colors_spark</span>
</div>
<h1 class="text-primary font-headline font-extrabold text-4xl tracking-tight mb-4">
            Welcome to Choreboo!
        </h1>
<p class="text-on-surface-variant font-body text-lg leading-relaxed px-4">
            Your chores are about to get magical. Complete your daily habits to earn treats and feed your new best friend.
        </p>
</div>
<!-- Pet Selection Grid -->
<div class="w-full z-10 my-8">
<h2 class="text-on-surface font-headline font-bold text-xl mb-6 ml-2">Choose Your First Companion</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Fox Pet (Selected by default) -->
<button class="pet-option selected group relative flex flex-col items-center p-4 rounded-3xl border-2 border-transparent transition-all duration-300 bg-white/50 shadow-sm">
<div class="w-24 h-24 rounded-full bg-surface-container-highest flex items-center justify-center mb-3 overflow-hidden shadow-inner">
<span class="text-5xl group-hover:scale-110 transition-transform">🦊</span>
</div>
<span class="font-bold text-on-surface">Fox</span>
<div class="absolute top-2 right-2 w-6 h-6 bg-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[16px] font-bold" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
<!-- Bear Pet -->
<button class="pet-option group flex flex-col items-center p-4 rounded-3xl border-2 border-transparent transition-all duration-300 bg-white/50 hover:bg-white shadow-sm">
<div class="w-24 h-24 rounded-full bg-surface-container-highest flex items-center justify-center mb-3 overflow-hidden shadow-inner">
<span class="text-5xl group-hover:scale-110 transition-transform">🐻</span>
</div>
<span class="font-bold text-on-surface">Bear</span>
</button>
<!-- Penguin Pet -->
<button class="pet-option group flex flex-col items-center p-4 rounded-3xl border-2 border-transparent transition-all duration-300 bg-white/50 hover:bg-white shadow-sm">
<div class="w-24 h-24 rounded-full bg-surface-container-highest flex items-center justify-center mb-3 overflow-hidden shadow-inner">
<span class="text-5xl group-hover:scale-110 transition-transform">🐧</span>
</div>
<span class="font-bold text-on-surface">Penguin</span>
</button>
<!-- Cat Pet -->
<button class="pet-option group flex flex-col items-center p-4 rounded-3xl border-2 border-transparent transition-all duration-300 bg-white/50 hover:bg-white shadow-sm">
<div class="w-24 h-24 rounded-full bg-surface-container-highest flex items-center justify-center mb-3 overflow-hidden shadow-inner">
<span class="text-5xl group-hover:scale-110 transition-transform">🐱</span>
</div>
<span class="font-bold text-on-surface">Cat</span>
</button>
</div>
</div>
<!-- Input Section -->
<div class="w-full z-10 space-y-6">
<div class="space-y-2">
<label class="block ml-4 text-sm font-bold text-on-surface-variant uppercase tracking-wider" for="pet-name">Guardian Identity</label>
<div class="relative">
<input class="w-full h-16 px-6 bg-surface-container-high border-none rounded-full text-lg font-medium text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all" id="pet-name" maxlength="20" placeholder="Name your pet..." type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline" data-icon="edit">edit</span>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-container text-white rounded-full font-headline font-bold text-lg shadow-[0_12px_24px_rgba(0,110,28,0.2)] active:scale-95 transition-all flex items-center justify-center gap-3">
            Hatch My Choreboo! ✨
        </button>
<p class="text-center text-sm font-label text-on-surface-variant/60">
            You can change the name later in Settings
        </p>
</div>
</main>
<!-- Visual Polish: Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCYb0pOL8r_ikamYm6I97GU7blBKuACjKxL3vGuY3Ohb_8I0aRxZ_40FqXHTKDJt0vDV7_nGvRdycFEBngeCiCoxy3Pa98OKmE8RtYdhqJzozFsBH0U4GSzkJXhaFKVfcdXsBtlFEPUgrNj3l8QuV_1PkP4mVcz2FDEbueiAwlLGueHkm1kpJIG4Cc_dJpP0uf-m2Cj06n4_2xwoVwPlZNopItauH7mvULElUGDlLKUSXe8fnk9Z4BjMREMMaRkefmSnxtqeAyqG0gF');">
</div>
<script>
    // Simple script to handle selection visually in this static demo
    document.querySelectorAll('.pet-option').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.pet-option').forEach(opt => {
                opt.classList.remove('selected');
                const check = opt.querySelector('.bg-primary');
                if (check) check.remove();
            });
            button.classList.add('selected');
            
            // Add checkmark to new selection
            const checkContainer = document.createElement('div');
            checkContainer.className = 'absolute top-2 right-2 w-6 h-6 bg-primary rounded-full flex items-center justify-center';
            checkContainer.innerHTML = '<span class="material-symbols-outlined text-white text-[16px] font-bold" style="font-variation-settings: \'wght\' 700;">check</span>';
            button.appendChild(checkContainer);

            // Update placeholder
            const name = button.querySelector('span:not(.material-symbols-outlined)').innerText;
            document.getElementById('pet-name').placeholder = `Name your ${name}...`;
        });
    });
</script>
</body></html>
