<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Choreboo - Add New Habit</title>

              "surface-bright": "#f6fafe",
              "on-background": "#171c1f",

              "surface-container-highest": "#dfe3e7",

              "surface-dim": "#d6dade",
              "on-secondary-fixed-variant": "#693c00",
              "primary-fixed": "#94f990",
              "on-error": "#ffffff",
              "tertiary": "#6833ea",

              "on-error-container": "#93000a",

            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 px-4 pt-4 pb-2 bg-[#f6fafe] dark:bg-slate-950 sticky z-40">
<div class="flex justify-between items-center w-full max-w-md mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden ring-2 ring-primary-container/20">
<img class="w-full h-full object-cover" data-alt="a cute beagle dog wearing a tiny colorful scarf sitting in a bright sunlit living room" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8FYF6DFcmDhxiW9rbdjlRGFMyeSvhfYEXZAZS9TE_ohmK84-ENz3PZwjqEzUbprJsnfVQZexhZGH0yInUXDpOeeR4zc22kYqnxcvsYI0tGO-InIVECyexRsvUoA2dUFK38eenx2yYrExeZ-vvqMt40DtzWQEp1uoVd8Qp88KwKlDsLbl8W7o9eJysjGwMSA6cckR801xu6a_zTOwutedPFKMnywk6dKp3qSmliLLNdvhabZhmhV0KOIzrwgHwLxV_6mDXJRgALqmX"/>
</div>
<h1 class="text-[#006e1c] dark:text-[#4caf50] font-black italic font-['Plus_Jakarta_Sans'] tracking-tight text-2xl">Choreboo</h1>
</div>
<button class="text-slate-500 dark:text-slate-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="w-full max-w-md px-6 py-4 flex flex-col gap-8">
<!-- Title Section -->
<section>
<h2 class="text-4xl font-bold tracking-tight text-on-surface mb-2">New Habit</h2>
<p class="text-on-surface-variant body-lg">Every great journey starts with a small step.</p>
</section>
<!-- Habit Icon & Name Input -->
<section class="flex flex-col gap-4">
<div class="flex items-center gap-4">
<div class="w-20 h-20 bg-surface-container-high rounded-xl flex items-center justify-center text-4xl shadow-sm border-b-4 border-primary-container/30">
                    🥗
                </div>
<div class="flex-1">
<label class="block text-xs font-bold uppercase tracking-widest text-primary mb-1">Habit Name</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary-container/40 placeholder:text-outline/50 px-4 py-3" placeholder="Drink more water..." type="text"/>
</div>
</div>
<!-- Icon Picker -->
<div class="flex gap-3 overflow-x-auto py-2 hide-scrollbar">
<button class="flex-shrink-0 w-12 h-12 bg-surface-container-lowest rounded-full flex items-center justify-center text-xl ring-2 ring-primary-container">🥗</button>
<button class="flex-shrink-0 w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center text-xl hover:bg-surface-container-highest transition-colors">💧</button>
<button class="flex-shrink-0 w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center text-xl hover:bg-surface-container-highest transition-colors">🏃</button>
<button class="flex-shrink-0 w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center text-xl hover:bg-surface-container-highest transition-colors">📚</button>
<button class="flex-shrink-0 w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center text-xl hover:bg-surface-container-highest transition-colors">🧘</button>
<button class="flex-shrink-0 w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center text-xl hover:bg-surface-container-highest transition-colors">🧹</button>
<button class="flex-shrink-0 w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center text-xl hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-outline" data-icon="add">add</span>
</button>
</div>
</section>
<!-- Frequency Bento Grid -->
<section class="grid grid-cols-2 gap-4">
<div class="col-span-2 bg-surface-container-low p-5 rounded-xl border-l-4 border-primary shadow-sm">
<h3 class="font-bold text-lg mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="calendar_month">calendar_month</span>
                    Frequency
                </h3>
<div class="flex justify-between gap-2">
<button class="flex-1 py-2 rounded-lg bg-primary-container text-on-primary-container font-bold text-sm">Daily</button>
<button class="flex-1 py-2 rounded-lg bg-surface-container-highest text-on-surface-variant font-medium text-sm">Weekly</button>
<button class="flex-1 py-2 rounded-lg bg-surface-container-highest text-on-surface-variant font-medium text-sm">Custom</button>
</div>
</div>
<!-- Difficulty Slider -->
<div class="bg-surface-container-low p-5 rounded-xl flex flex-col justify-between shadow-sm">
<div>
<h3 class="font-bold text-sm uppercase tracking-wider text-outline-variant mb-4">Difficulty</h3>
<div class="flex items-center justify-between mb-2">
<span class="text-2xl">⚡</span>
<span class="font-bold text-primary">Medium</span>
</div>
</div>
<input class="w-full h-2 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary" type="range"/>
</div>
<!-- Reward Potential -->
<div class="bg-tertiary-container/10 p-5 rounded-xl flex flex-col justify-between shadow-sm border border-tertiary-container/20">
<h3 class="font-bold text-sm uppercase tracking-wider text-tertiary mb-4">XP Reward</h3>
<div class="flex items-end gap-1">
<span class="text-3xl font-black text-tertiary">150</span>
<span class="text-xs font-bold text-tertiary mb-1">XP</span>
</div>
<p class="text-[10px] text-on-tertiary-container/60 mt-2 font-medium">Boosts your pet's energy!</p>
</div>
</section>
<!-- Notification Setting -->
<section class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="p-2 bg-secondary-container/20 rounded-lg text-secondary">
<span class="material-symbols-outlined" data-icon="alarm">alarm</span>
</div>
<div>
<p class="font-bold text-sm">Daily Reminder</p>
<p class="text-xs text-on-surface-variant">Notify me at 08:30 AM</p>
</div>
</div>
<div class="w-12 h-6 bg-primary-container rounded-full relative">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
</div>
</section>
<!-- CTA Action -->
<div class="mt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-bold py-5 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-3 transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="task_alt">task_alt</span>
                Create Habit
            </button>
<button class="w-full py-4 text-outline font-medium text-sm mt-2 hover:text-primary transition-colors">
                Cancel &amp; Go Back
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pb-8 z-50">
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm rounded-full py-3 px-6 bg-[#dfe3e7]/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_24px_48px_-12px_rgba(0,110,28,0.15)] flex justify-around items-center tonal-shift surface-container-highest">
<!-- Habits (Active) -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#006e1c] to-[#4caf50] text-white rounded-full p-3 -mt-8 shadow-lg ring-4 ring-[#f6fafe] dark:ring-slate-950 scale-110 transition-all duration-300 ease-out hover:scale-105 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="checklist">checklist</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-wider mt-1">Habits</span>
</a>
<!-- Pet -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#006e1c] dark:hover:text-[#4caf50] transition-all duration-300 ease-out hover:scale-105 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="pets">pets</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-wider mt-1">Pet</span>
</a>
<!-- Calendar -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#006e1c] dark:hover:text-[#4caf50] transition-all duration-300 ease-out hover:scale-105 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-wider mt-1">Calendar</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-[#006e1c] dark:hover:text-[#4caf50] transition-all duration-300 ease-out hover:scale-105 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-wider mt-1">Settings</span>
</a>
</div>
</nav>
</body></html>
