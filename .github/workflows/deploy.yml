name: Deploy to Play Console (Internal Testing)

on:
  push:
    branches:
      - master

# Required for Workload Identity Federation OIDC token
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy Release AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Decode google-services.json ─────────────────────────────────
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle wrapper permissions ───────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ── 3b. Generate Data Connect SDK ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Data Connect SDK
        run: npx -y firebase-tools@latest dataconnect:sdk:generate

      # ── 4. Decode & write keystore ──────────────────────────────────────────
      # The keystore is stored as a base64-encoded secret. Decode it to a temp
      # file and pass the path to Gradle via environment variable.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV

      # ── 5. Authenticate with Google Cloud (Workload Identity Federation) ───
      # No JSON key required — GitHub's OIDC token is exchanged for a short-lived
      # GCP access token. Set up the pool/provider with:
      #
      #   gcloud iam workload-identity-pools create "github-pool" \
      #     --location="global" --display-name="GitHub Actions"
      #
      #   gcloud iam workload-identity-pools providers create-oidc "github-provider" \
      #     --location="global" \
      #     --workload-identity-pool="github-pool" \
      #     --display-name="GitHub" \
      #     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
      #     --issuer-uri="https://token.actions.githubusercontent.com"
      #
      #   gcloud iam service-accounts add-iam-policy-binding \
      #     "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
      #     --role="roles/iam.workloadIdentityUser" \
      #     --member="principalSet://iam.googleapis.com/projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/attribute.repository/hebd1/choreboo"
      #
      # Then grant the service account "Release manager" in Play Console → API access.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      # ── 6. Compute version numbers ──────────────────────────────────────────
      # versionCode  = GitHub run number (monotonically increasing, never resets)
      # versionName  = "1.1.<run_number>"  — bump the "1.1" prefix manually in
      #                app/build.gradle.kts for major/minor releases.
      - name: Compute version numbers
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.1.${{ github.run_number }}" >> $GITHUB_ENV

      # ── 7. Build release AAB ─────────────────────────────────────────────────
      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ env.VERSION_CODE }} \
            -PversionName=${{ env.VERSION_NAME }}

      # ── 8. Upload to Play Console (Internal Testing track) ──────────────────
      # Uses the Google Play Developer REST API v3 directly with the WIF access token.
      # This avoids the Triple-T Gradle plugin which has SSL issues with WIF on GitHub runners.
      - name: Create Play Console edit
        id: create_edit
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/com.choreboo.app/edits")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Failed to create edit (HTTP $HTTP_CODE)"
            exit 1
          fi
          EDIT_ID=$(echo "$BODY" | jq -r '.id')
          echo "edit_id=$EDIT_ID" >> $GITHUB_OUTPUT

      - name: Upload AAB to edit
        id: upload_aab
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/com.choreboo.app/edits/${{ steps.create_edit.outputs.edit_id }}/bundles?uploadType=media")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Failed to upload AAB (HTTP $HTTP_CODE)"
            exit 1
          fi
          VERSION_CODE=$(echo "$BODY" | jq -r '.versionCode')
          echo "Uploaded versionCode: $VERSION_CODE"

      - name: Assign AAB to internal track
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "releases": [{
                "versionCodes": ["${{ env.VERSION_CODE }}"],
                "status": "completed"
              }]
            }' \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/com.choreboo.app/edits/${{ steps.create_edit.outputs.edit_id }}/tracks/internal")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Failed to assign track (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Commit edit
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/com.choreboo.app/edits/${{ steps.create_edit.outputs.edit_id }}:commit")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Failed to commit edit (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Successfully published to Internal Testing track!"

      # ── 9. Upload AAB as workflow artifact (optional, useful for debugging) ─
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.VERSION_NAME }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
