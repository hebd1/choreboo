# ============================================================
# Choreboo Habit Tracker - Firebase Data Connect Schema
# ============================================================
# Tables: User, Household, Choreboo, Habit, HabitLog, PurchasedBackground
# ============================================================

# ---- User ----
# Keyed by Firebase Auth UID (String PK, not auto UUID).
# Created on first sign-in.
# D7 fix: household @ref uses onDelete: NO_ACTION (Data Connect default; PostgreSQL FK is
# RESTRICT). The ResetRepository nulls out the creator's User.household FK via
# UpdateUserHousehold before deleting the Household row, avoiding FK violations.
# Other members' User.household FKs are cleared by a NullifyHouseholdForMembers mutation
# called before the Household delete in the reset flow — see ResetRepository.kt.
type User @table {
  id: String! @col(name: "uid")
  displayName: String!
  email: String
  photoUrl: String
  household: Household @ref
  createdAt: Timestamp! @default(expr: "request.time")
  totalPoints: Int! @default(value: 0)
  totalLifetimeXp: Int! @default(value: 0)
}

# ---- Household ----
# A shared group. Members join via 6-char invite code.
type Household @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  inviteCode: String! @unique
  createdBy: User! @ref
  createdAt: Timestamp! @default(expr: "request.time")
}

# ---- Choreboo (Pet) ----
# One per user. Owner tracked by ownerUid FK to User.
# backgroundId references the selected background from the BACKGROUND_REGISTRY (e.g. "sunset").
# Null means the default mood-based gradient is shown.
type Choreboo @table {
  id: UUID! @default(expr: "uuidV4()")
  owner: User! @ref @unique
  name: String!
  stage: String!
  level: Int!
  xp: Int!
  hunger: Int!
  happiness: Int!
  energy: Int!
  petType: String!
  lastInteractionAt: Timestamp!
  createdAt: Timestamp! @default(expr: "request.time")
  sleepUntil: Timestamp
  backgroundId: String
}

# ---- PurchasedBackground ----
# One row per background purchased by a user.
# backgroundId matches a BackgroundItem.id from the client-side BACKGROUND_REGISTRY.
# Unique constraint on (owner, backgroundId) prevents duplicate purchases.
type PurchasedBackground @table(key: ["owner", "backgroundId"]) {
  owner: User! @ref
  backgroundId: String!
  purchasedAt: Timestamp! @default(expr: "request.time")
}

# ---- Habit ----
# Supports both personal and household habits.
# ownerUid = creator's UID. householdId populated for shared habits.
# assignedTo: optional single member the habit is assigned to (household habits only).
# P5-03 note: ownerId column is already automatically indexed by Data Connect for FK
# references (@ref), so no explicit @index is needed for the owner field.
type Habit @table {
  id: UUID! @default(expr: "uuidV4()")
  owner: User! @ref
  household: Household @ref
  assignedTo: User @ref
  title: String!
  description: String
  iconName: String!
  customDays: String!
  difficulty: Int!
  baseXp: Int!
  reminderEnabled: Boolean!
  reminderTime: String
  isHouseholdHabit: Boolean!
  isArchived: Boolean!
  createdAt: Timestamp! @default(expr: "request.time")
}

# ---- HabitLog ----
# One row per completion. Links to Habit and the completing User.
# Room enforces UNIQUE(habitId, date) locally via OnConflictStrategy.IGNORE.
# P4-06 fix: @unique(fields: ["habit", "date", "completedBy"]) enforces cloud-side
# uniqueness, preventing duplicate completion logs from race conditions or retries.
# The UUID id PK is retained so remoteId stamping still works correctly.
# P5-03 fix: @index on date for fast per-date log queries. habitId and completedById
# columns are already indexed automatically by Data Connect for FK references (@ref).
type HabitLog @table @unique(fields: ["habit", "date", "completedBy"]) @index(fields: ["date"]) {
  id: UUID! @default(expr: "uuidV4()")
  habit: Habit! @ref
  completedBy: User! @ref
  completedAt: Timestamp! @default(expr: "request.time")
  date: String!
  xpEarned: Int!
  streakAtCompletion: Int!
}
