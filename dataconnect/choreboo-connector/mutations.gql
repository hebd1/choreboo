# Only the owning user can update their choreboo sleep state.
mutation UpdateChorebooSleep(
  $chorebooId: UUID!,
  $sleepUntil: Timestamp
) @auth(level: USER) {
  choreboo_updateMany(
    where: { id: { eq: $chorebooId }, ownerId: { eq_expr: "auth.uid" } }
