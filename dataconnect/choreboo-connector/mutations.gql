# ============================================================
# Choreboo - Data Connect Mutations
# ============================================================

# ---- User Mutations ----

mutation UpsertUser($displayName: String!, $email: String, $photoUrl: String)
@auth(level: USER) {
  user_upsert(
    data: {
      id_expr: "auth.uid"
      displayName: $displayName
      email: $email
      photoUrl: $photoUrl
    }
  )
}

mutation UpdateUserHousehold($householdId: UUID) @auth(level: USER) {
  user_update(
    key: { id_expr: "auth.uid" }
    data: { householdId: $householdId }
  )
}

# Update the current user's point totals. Called as write-through after habit completion
# and during cloud-to-local sync (G16 fix).
mutation UpdateUserPoints($totalPoints: Int!, $totalLifetimeXp: Int!) @auth(level: USER) {
  user_update(
    key: { id_expr: "auth.uid" }
    data: { totalPoints: $totalPoints, totalLifetimeXp: $totalLifetimeXp }
  )
}

# ---- Household Mutations ----

mutation CreateHousehold($name: String!, $inviteCode: String!)
@auth(level: USER) {
  household_insert(
    data: {
      name: $name
      inviteCode: $inviteCode
      createdById_expr: "auth.uid"
    }
  )
}

# P3-09 fix: NullifyHouseholdForMembers is scoped to the household creator via a WHERE
# filter that traverses User → Household → createdById. Only members of a household
# whose createdById matches auth.uid are updated. This replaces the previous
# insecureReason suppression with an enforced server-side auth check — the creator
# ownership is now verified in the database rather than relying on the caller obtaining
# householdId from a scoped query.
mutation NullifyHouseholdForMembers($householdId: UUID!) @auth(level: USER) {
  user_updateMany(
    where: {
      _and: [
        { householdId: { eq: $householdId } }
        { household: { createdById: { eq_expr: "auth.uid" } } }
      ]
    }
    data: { householdId: null }
  )
}

# Only the creator can delete their household.
mutation DeleteHousehold($householdId: UUID!) @auth(level: USER) {
  household_deleteMany(
    where: { id: { eq: $householdId }, createdById: { eq_expr: "auth.uid" } }
  )
}

# ---- Choreboo Mutations ----

mutation InsertChoreboo(
  $name: String!,
  $stage: String!,
  $level: Int!,
  $xp: Int!,
  $hunger: Int!,
  $happiness: Int!,
  $energy: Int!,
  $petType: String!,
  $lastInteractionAt: Timestamp!,
  $sleepUntil: Timestamp
) @auth(level: USER) {
  choreboo_insert(
    data: {
      ownerId_expr: "auth.uid"
      name: $name
      stage: $stage
      level: $level
      xp: $xp
      hunger: $hunger
      happiness: $happiness
      energy: $energy
      petType: $petType
      lastInteractionAt: $lastInteractionAt
      sleepUntil: $sleepUntil
    }
  )
}

# Only the owning user can update their choreboo (ownerId scoped to auth.uid).
mutation UpdateChorebooFull(
  $chorebooId: UUID!,
  $name: String!,
  $stage: String!,
  $level: Int!,
  $xp: Int!,
  $hunger: Int!,
  $happiness: Int!,
  $energy: Int!,
  $petType: String!,
  $lastInteractionAt: Timestamp!,
  $sleepUntil: Timestamp,
  $backgroundId: String
) @auth(level: USER) {
  choreboo_updateMany(
    where: { id: { eq: $chorebooId }, ownerId: { eq_expr: "auth.uid" } }
    data: {
      name: $name
      stage: $stage
      level: $level
      xp: $xp
      hunger: $hunger
      happiness: $happiness
      energy: $energy
      petType: $petType
      lastInteractionAt: $lastInteractionAt
      sleepUntil: $sleepUntil
      backgroundId: $backgroundId
    }
  )
}

