# ============================================================
# Choreboo - Data Connect Queries
# ============================================================

# ---- User Queries ----

query GetCurrentUser @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    id
    displayName
    email
    photoUrl
    household {
      id
      name
      inviteCode
    }
    createdAt
  }
}

query GetUserById($userId: String!) @auth(level: USER) {
  user(key: { id: $userId }) {
    id
    displayName
    photoUrl
    household {
      id
      name
    }
  }
}

# ---- Household Queries ----

# Inherently scoped: traverses from the authenticated user to their household.
# No householdId parameter — caller can only see their own household.
query GetMyHousehold @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    household {
      id
      name
      inviteCode
      createdBy {
        id
        displayName
      }
      createdAt
    }
  }
}

query GetHouseholdByInviteCode($inviteCode: String!) @auth(level: USER) {
  households(where: { inviteCode: { eq: $inviteCode } }, limit: 1) {
    id
    name
    inviteCode
    createdBy {
      id
      displayName
    }
  }
}

# Inherently scoped: traverses from the authenticated user to their household's members.
# Uses the auto-generated reverse relation `users_on_household`.
query GetMyHouseholdMembers @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    household {
      users_on_household {
        id
        displayName
        photoUrl
        email
      }
    }
  }
}

# ---- Choreboo Queries ----

query GetMyChoreboo @auth(level: USER) {
  choreboos(where: { ownerId: { eq_expr: "auth.uid" } }, limit: 1) {
    id
    name
    stage
    level
    xp
    hunger
    happiness
    energy
    petType
    lastInteractionAt
    createdAt
    sleepUntil
    owner {
      id
      displayName
    }
  }
}

# Inherently scoped: traverses from the authenticated user to their household's
# members' choreboos. Uses nested reverse relations.
query GetMyHouseholdChoreboos @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    household {
      users_on_household {
        id
        displayName
        photoUrl
        choreboo_on_owner {
          id
          name
          stage
          level
          xp
          hunger
          happiness
          energy
          petType
          lastInteractionAt
          sleepUntil
        }
      }
    }
  }
}

# ---- Habit Queries ----

query GetMyHabits @auth(level: USER) {
  habits(
    where: { ownerId: { eq_expr: "auth.uid" }, isArchived: { eq: false } }
  ) {
    id
    title
    description
    iconName
    customDays
    difficulty
    baseXp
    reminderEnabled
    reminderTime
    isHouseholdHabit
    isArchived
    createdAt
    household {
      id
      name
    }
  }
}

# Inherently scoped: traverses from the authenticated user to their household's habits.
# Uses the auto-generated reverse relation `habits_on_household`.
query GetMyHouseholdHabits @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    household {
      habits_on_household(where: { isHouseholdHabit: { eq: true }, isArchived: { eq: false } }) {
        id
        title
        description
        iconName
        customDays
        difficulty
        baseXp
        isHouseholdHabit
        createdAt
        owner {
          id
          displayName
        }
      }
    }
  }
}

# Restricted to habits owned by the caller OR household habits the caller is a member of.
# Uses _or to allow both personal and shared habit access.
query GetHabitById($habitId: UUID!) @auth(level: USER) {
  habits(
    where: {
      _and: [
        { id: { eq: $habitId } }
        {
          _or: [
            { ownerId: { eq_expr: "auth.uid" } }
            { isHouseholdHabit: { eq: true } }
          ]
        }
      ]
    }
    limit: 1
  ) {
    id
    title
    description
    iconName
    customDays
    difficulty
    baseXp
    reminderEnabled
    reminderTime
    isHouseholdHabit
    isArchived
    createdAt
    owner {
      id
      displayName
    }
    household {
      id
      name
    }
  }
}

# ---- HabitLog Queries ----

# Returns logs for a specific habit. Caller must be the owner or the habit must be a household habit.
query GetLogsForHabit($habitId: UUID!) @auth(level: USER) {
  habitLogs(
    where: {
      _and: [
        { habitId: { eq: $habitId } }
        {
          habit: {
            _or: [
              { ownerId: { eq_expr: "auth.uid" } }
              { isHouseholdHabit: { eq: true } }
            ]
          }
        }
      ]
    }
    orderBy: [{ completedAt: DESC }]
  ) {
    id
    completedAt
    date
    xpEarned
    streakAtCompletion
    completedBy {
      id
      displayName
    }
  }
}

query GetMyLogsForDate($date: String!) @auth(level: USER) {
  habitLogs(
    where: { completedById: { eq_expr: "auth.uid" }, date: { eq: $date } }
  ) {
    id
    habitId
    completedAt
    date
    xpEarned
    streakAtCompletion
  }
}

query GetMyLogsForDateRange($startDate: String!, $endDate: String!) @auth(level: USER) {
  habitLogs(
    where: {
      completedById: { eq_expr: "auth.uid" }
      date: { ge: $startDate, le: $endDate }
    }
    orderBy: [{ date: ASC }]
  ) {
    id
    habitId
    completedAt
    date
    xpEarned
    streakAtCompletion
    habit {
      id
      title
      iconName
    }
  }
}

# Returns logs for a specific habit on a specific date.
# Caller must own the habit or it must be a household habit.
query GetLogsForHabitAndDate($habitId: UUID!, $date: String!) @auth(level: USER) {
  habitLogs(
    where: {
      _and: [
        { habitId: { eq: $habitId } }
        { date: { eq: $date } }
        {
          habit: {
            _or: [
              { ownerId: { eq_expr: "auth.uid" } }
              { isHouseholdHabit: { eq: true } }
            ]
          }
        }
      ]
    }
  ) {
    id
    completedAt
    xpEarned
    streakAtCompletion
    completedBy {
      id
      displayName
    }
  }
}
