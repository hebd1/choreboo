</button>
</header>
<main class="max-w-2xl mx-auto px-6 py-8">
<!-- Editorial Header Section -->
<div class="mb-10">
<div class="flex items-center gap-2 mb-2">
<span class="text-tertiary font-bold tracking-widest text-xs uppercase">The Living Narrative</span>
</div>
<h2 class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface mb-4">Forge a New Habit</h2>
<p class="text-on-surface-variant font-body leading-relaxed max-w-md">Every journey begins with a single intentional choice. Define your ritual below.</p>
</div>
<form class="space-y-12">
<!-- Text Inputs Section -->
<div class="space-y-6">
<div class="group">
<label class="block text-sm font-bold text-on-surface-variant mb-2 px-1">Habit Title *</label>
<input class="w-full bg-surface-container-high border-none rounded-lg p-4 text-xl font-semibold placeholder:text-outline focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/40 transition-all" placeholder="e.g., Morning Meditation" required="" type="text"/>
</div>
<div class="group">
<label class="block text-sm font-bold text-on-surface-variant mb-2 px-1">Lore / Description</label>
<textarea class="w-full bg-surface-container-high border-none rounded-lg p-4 font-body placeholder:text-outline focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/40 transition-all" placeholder="Describe the story behind this habit..." rows="3"></textarea>
</div>
</div>
<!-- Icon Picker Section -->
<section>
<label class="block text-sm font-bold text-on-surface-variant mb-4 px-1">Choose Your Sigil</label>
<div class="flex flex-wrap gap-4">
<!-- Icon Item (Active Example) -->
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-primary-container border-2 border-primary text-on-primary-container shadow-lg transition-transform hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="CheckCircle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Inactive Icons -->
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="FitnessCenter">fitness_center</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="MenuBook">menu_book</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="WaterDrop">water_drop</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="SelfImprovement">self_improvement</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="MusicNote">music_note</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="LocalFireDepartment">local_fire_department</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="DirectionsRun">directions_run</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="Bedtime">bedtime</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="Code">code</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="Restaurant">restaurant</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="CleaningServices">cleaning_services</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="School">school</span>
</button>

<span class="material-symbols-outlined" data-icon="Brush">brush</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container text-on-surface-variant hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="Favorite">favorite</span>
</button>
</div>
</section>
<!-- Frequency and Days -->

<select class="w-full bg-surface-container-lowest border-none rounded-lg p-4 font-semibold text-primary appearance-none cursor-pointer">
<option>Daily</option>
<option>Weekly</option>
<option selected="">Custom</option>
</select>
</div>
<!-- Custom Day Chips (Visible when Custom is selected) -->
<div>
<label class="block text-xs font-bold text-outline uppercase tracking-wider mb-4 px-1">Selected Days</label>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2 rounded-full bg-primary text-white font-bold text-sm transition-all shadow-md" type="button">MON</button>
<button class="px-5 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-outline-variant transition-all" type="button">TUE</button>
<button class="px-5 py-2 rounded-full bg-primary text-white font-bold text-sm transition-all shadow-md" type="button">WED</button>
<button class="px-5 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-outline-variant transition-all" type="button">THU</button>

<button class="px-5 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-outline-variant transition-all" type="button">SUN</button>

<span class="text-3xl font-black text-primary tracking-tighter">03</span>
</div>
<input class="w-full h-2 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary" max="10" min="1" type="range" value="3"/>
<div class="flex justify-between mt-2 text-[10px] font-bold text-outline">
<span>1 MIN</span>
<span>10 MAX</span>

<input class="w-full h-2 bg-tertiary-container/30 rounded-lg appearance-none cursor-pointer accent-tertiary relative z-10" max="50" min="5" type="range" value="25"/>
<div class="flex justify-between mt-2 text-[10px] font-bold text-on-tertiary-fixed-variant relative z-10">
<span>5 XP</span>
<span>50 XP</span>
</div>
</div>
</div>
<!-- Save Button -->
<div class="pt-6">
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-container text-white font-black text-xl tracking-tight rounded-xl shadow-xl shadow-primary/20 hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Etch into Narrative</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
